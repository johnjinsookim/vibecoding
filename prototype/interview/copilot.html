<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foundry Copilot - Eval Recommendations</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="side-rail" aria-label="Primary navigation">
        <img class="brand-logo" src="./assets/azure-ai-foundry-logo.svg" alt="Azure AI Foundry" />
        <div class="rail-nav" aria-label="Navigation items">
          <a class="nav-item nav-item-active" href="./index.html" aria-label="Evaluations">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 19H20" />
                <path d="M7 16V10" />
                <path d="M12 16V6" />
                <path d="M17 16V12" />
              </svg>
            </span>
            <span class="nav-label">Evaluations</span>
          </a>
          <a class="nav-item" href="./deployment-center.html" aria-label="Deployment Center">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 8L12 4L20 8L12 12L4 8Z" />
                <path d="M4 12L12 16L20 12" />
                <path d="M4 16L12 20L20 16" />
              </svg>
            </span>
            <span class="nav-label">Deployment Center</span>
          </a>
        </div>
      </aside>

      <main class="workspace">
        <section class="chat-layout">
          <header class="chat-top">
            <div>
              <h1>Copilot Eval Recommendations</h1>
              <p id="chatSubhead">Review generated eval ideas and supporting repo snippets.</p>
            </div>
            <a class="back-link" href="./index.html">Back to create your evals</a>
          </header>

          <section class="chat-window" aria-label="Copilot chat window">
            <div id="chatThread" class="chat-thread"></div>
            <section class="customize-panel" aria-label="Create evals from recommendations">
              <div class="customize-head">
                <h2>Create from customized evals</h2>
                <button id="createSelectedBtn" class="primary-btn" type="button">Create selected evals</button>
              </div>
              <p id="customizeStatus" class="muted-line">Select recommendations and create evals for deployment.</p>
              <ul id="recommendationChecklist" class="checklist"></ul>
            </section>
            <div class="chat-composer">
              <input type="text" disabled value="Copilot generation complete for this prototype." aria-label="Disabled prototype composer" />
              <button type="button" disabled>Send</button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="./copilot.js"></script>
  </body>
</html>
