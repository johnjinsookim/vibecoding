<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foundry - Deployment Center</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sideRail" class="side-rail" aria-label="Primary navigation">
        <img class="brand-logo" src="./assets/azure-ai-foundry-logo.svg" alt="Azure AI Foundry" />
        <nav class="rail-nav">
          <a id="createAgentNav" class="nav-item" aria-label="Evaluations" href="./index.html">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 19H20" />
                <path d="M7 16V10" />
                <path d="M12 16V6" />
                <path d="M17 16V12" />
              </svg>
            </span>
            <span class="nav-label">Evaluations</span>
          </a>
          <a id="deploymentCenterNav" class="nav-item nav-item-active" aria-label="Deployment Center" href="./deployment-center.html">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 8L12 4L20 8L12 12L4 8Z" />
                <path d="M4 12L12 16L20 12" />
                <path d="M4 16L12 20L20 16" />
              </svg>
            </span>
            <span class="nav-label">Deployment Center</span>
          </a>
        </nav>
      </aside>

      <main class="workspace">
        <section class="deploy-layout">
          <header class="deploy-header">
            <div class="deploy-head-row">
              <div>
                <h1>Deployment Center</h1>
                <p>Manage deployment states and monitor health across development and production.</p>
              </div>
            </div>
          </header>

          <section class="deploy-grid">
            <article class="deploy-card">
              <div class="deploy-card-head">
                <div class="deploy-filters">
                  <select id="evalTypeFilter">
                    <option value="all">All evaluation types</option>
                    <option value="regression">Regression</option>
                    <option value="quality">Quality</option>
                    <option value="replay">Replay</option>
                    <option value="policy">Policy</option>
                  </select>
                  <select id="agentFilter">
                    <option value="all">All agents</option>
                  </select>
                  <select id="envFilter">
                    <option value="all">All environments</option>
                    <option value="development">Development</option>
                    <option value="production">Production</option>
                  </select>
                  <select id="statusFilter">
                    <option value="all">All status</option>
                    <option value="active">Active</option>
                    <option value="not configured">Not configured</option>
                  </select>
                  <select id="healthFilter">
                    <option value="all">All health</option>
                    <option value="healthy">Healthy</option>
                    <option value="at risk">At risk</option>
                    <option value="unhealthy">Unhealthy</option>
                  </select>
                </div>
              </div>
              <div class="table-scroll">
                <table class="deploy-table">
                  <thead>
                    <tr>
                      <th>Agent</th>
                      <th>Environment</th>
                      <th>Status</th>
                      <th>Health</th>
                      <th>Avg eval</th>
                      <th>P95 latency</th>
                    </tr>
                  </thead>
                  <tbody id="healthRows"></tbody>
                </table>
              </div>
            </article>
          </section>
        </section>
      </main>
    </div>

    <aside id="agentDetailsPanel" class="agent-details-panel" aria-label="Agent JSON panel" aria-hidden="true">
      <div class="agent-details-head">
        <h2>Agent details</h2>
        <button id="closeAgentDetailsBtn" class="close-panel-btn" type="button" aria-label="Close panel">×</button>
      </div>
      <pre id="agentJsonOutput" class="json-output">{
  "message": "Select an agent row to view details."
}</pre>
    </aside>

    <script src="./deployment-center.js"></script>
  </body>
</html>
